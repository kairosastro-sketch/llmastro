[Definition]
# SECURITY-FAIL2BAN-CADDY-V1 — parse les access-logs JSON de Caddy
# (/var/log/caddy/access.log, cf. caddy/Caddyfile directive `log`).
# Bannit l'IP sur :
#   - status 429 (rate-limit applicatif atteint = abus)
#   - 401/403 répétés sur /api/auth/* (brute-force credentials au niveau HTTP)
failregex = ^.*"remote_ip":"<HOST>".*"status":429,.*$
            ^.*"remote_ip":"<HOST>".*"uri":"/api/auth/[^"]*".*"status":(401|403),.*$
ignoreregex =
# Caddy logge le temps en epoch float dans le champ "ts".
datepattern = "ts":{EPOCH}
