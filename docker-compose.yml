# ============================================================
# ASTRO PLATFORM — Local Development Stack
# ============================================================

networks:
  astro-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:

services:
  # ----------------------------------------------------------
  # PostgreSQL — Users, sessions, birth data
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: astro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astro_platform
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astro}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - astro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astro_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Neo4j — Ephemeris knowledge graph
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5.19-community
    container_name: astro-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-astro-secret}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    ports:
      - "7474:7474"   # Browser HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
      - ./docker/neo4j/seed.cypher:/import/seed.cypher:ro
    networks:
      - astro-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ----------------------------------------------------------
  # Redis — Ephemeris cache, rate limiting, sessions
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: astro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Adminer — DB UI (dev only)
  # ----------------------------------------------------------
  adminer:
    image: adminer:4
    container_name: astro-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - astro-net
    profiles: [tools]

# PATCH-COMPOSE-SECRETS-V1 applied

