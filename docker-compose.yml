version: "3.9"

# ============================================================
# ASTRO PLATFORM — Local Development Stack
# ============================================================

networks:
  astro-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:
  swisseph_data:

services:
  # ----------------------------------------------------------
  # PostgreSQL — Users, sessions, birth data
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: astro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astro_platform
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astro}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - astro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astro_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Neo4j — Ephemeris knowledge graph
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5.19-community
    container_name: astro-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-astro-secret}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    ports:
      - "7474:7474"   # Browser HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
      - ./docker/neo4j/seed.cypher:/import/seed.cypher:ro
    networks:
      - astro-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ----------------------------------------------------------
  # Redis — Ephemeris cache, rate limiting, sessions
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: astro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # API — Fastify backend
  # ----------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api.Dockerfile
      target: development
    container_name: astro-api
    restart: unless-stopped
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://astro:${POSTGRES_PASSWORD:-astro}@postgres:5432/astro_platform
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-astro-secret}
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "4000:4000"
      - "9229:9229"   # Node debugger
    volumes:
      - ./apps/api/src:/app/src:delegated
      - ./packages:/packages:delegated
      - swisseph_data:/usr/local/share/swisseph
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - astro-net
    command: pnpm dev

  # ----------------------------------------------------------
  # Web — Next.js frontend
  # ----------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web.Dockerfile
      target: development
    container_name: astro-web
    restart: unless-stopped
    env_file: .env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src:delegated
      - ./packages:/packages:delegated
    depends_on:
      - api
    networks:
      - astro-net
    command: pnpm dev

  # ----------------------------------------------------------
  # Adminer — DB UI (dev only)
  # ----------------------------------------------------------
  adminer:
    image: adminer:4
    container_name: astro-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - astro-net
    profiles: [tools]

# PATCH-COMPOSE-SECRETS-V1 applied

