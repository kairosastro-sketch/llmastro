# ============================================================
# ASTRO PLATFORM — Local Development Stack
# ============================================================

networks:
  astro-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ----------------------------------------------------------
  # PostgreSQL — Users, sessions, birth data
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: astro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astro_platform
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astro}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - astro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astro_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis — Ephemeris cache, rate limiting, sessions
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: astro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Adminer — DB UI (dev only)
  # ----------------------------------------------------------
  adminer:
    image: adminer:4
    container_name: astro-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - astro-net
    profiles: [tools]

