networks:
  astro-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  swisseph_data:
    external: true
    name: astro-platform_swisseph_data
  caddy_data:
  caddy_config:
  umami_db_data: # UMAMI-ANALYTICS-V1 : base dédiée, isolée de la base applicative

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: astro_platform
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [astro-net]
    healthcheck:
      # -d astro_platform requis : sans base explicite, pg_isready vise une base
      # nommée comme le user (astro), inexistante → FATAL toutes les 10s dans les
      # logs Postgres (healthcheck OK mais log pollué). Aligné sur le compose dev.
      test: ["CMD-SHELL", "pg_isready -U astro -d astro_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    # SECURITY-REDIS-AUTH-V1 : --requirepass impose un mot de passe. Le guard
    # `:?` fait échouer `compose up` si REDIS_PASSWORD n'est pas dans .env —
    # on ne démarre JAMAIS Redis sans auth en prod. REDIS_URL (côté api) est
    # construit depuis la MÊME var → toujours synchrone avec ce mot de passe.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes: [redis_data:/data]
    networks: [astro-net]

  api:
    # PULL-FROM-GHCR-V1 : image pre-built par CI à chaque merge sur
    # main (cf. .github/workflows/ci.yml job "docker"). Sur le VPS,
    # `docker compose pull api && docker compose up -d api` télécharge
    # cette image (~30 sec) au lieu de rebuild localement (~30 min).
    # Le bloc `build:` reste comme fallback : `up --build` rebuild
    # localement en cas d'urgence (GHCR down, etc.).
    # GHCR-NAMESPACE-TRANSFER-V1 : repo transféré Azdrian3 → kairosastro-sketch
    # (2026-06-11). La CI nomme les images via `github.repository`, donc elles
    # partent désormais sous ghcr.io/kairosastro-sketch/… ; l'ancien namespace
    # ghcr.io/azdrian3/… n'est PLUS mis à jour (GHCR ne suit pas les transferts).
    image: ghcr.io/kairosastro-sketch/llmastro/api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    restart: always
    env_file: .env.local
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://astro:${POSTGRES_PASSWORD}@postgres:5432/astro_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379 # SECURITY-REDIS-AUTH-V1
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_MODEL: ${XAI_MODEL:-grok-4-1-fast-non-reasoning}
      ASTRO_ENGINE: ${ASTRO_ENGINE:-swisseph}
      # CIEL-ISR-REVALIDATE-V1 — invalidation du cache /ciel côté web
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      WEB_REVALIDATE_URL: http://web:3000/revalidate-sky
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [astro-net]
    volumes:
      - swisseph_data:/usr/local/share/swisseph

    expose:
      - '4000'
  web:
    # PULL-FROM-GHCR-V1 (cf. note sur le service api).
    # GHCR-NAMESPACE-TRANSFER-V1 (cf. note sur le service api).
    image: ghcr.io/kairosastro-sketch/llmastro/web:latest
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://llmastro.com/api
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://llmastro.com/api
      INTERNAL_API_URL: http://api:4000  # CIEL-PUBLIC-V1-PAGES — used by SSR
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}  # CIEL-ISR-REVALIDATE-V1
    depends_on:
      - api
    networks: [astro-net]
    expose:
      - '3000'

  # UMAMI-ANALYTICS-V1 — mesure d'audience privacy-first, cookieless, exemptée de
  # consentement (CNIL) : aucun cookie, pas de donnée nominative, pas de tiers.
  # Servie EN FIRST-PARTY sous llmastro.com/analytics (cf. caddy/Caddyfile) → non
  # bloquée par les adblockers et AUCUNE modif CSP requise (same-origin). Base de
  # données DÉDIÉE (umami-db), isolée de la base applicative sensible : n'expose
  # pas les données chiffrées et ne déclenche pas le watchdog PG (SECURITY-DB-WATCHDOG-V1).
  umami-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:?UMAMI_DB_PASSWORD must be set in .env}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks: [astro-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET must be set in .env}
      BASE_PATH: /analytics            # sert tout sous /analytics (script + /api/send + dashboard)
      TRACKER_SCRIPT_NAME: sky         # script à /analytics/sky.js (nom neutre = esquive les filtres adblock)
      DISABLE_TELEMETRY: "1"
    depends_on:
      umami-db:
        condition: service_healthy
    networks: [astro-net]
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/log/caddy:/var/log/caddy # SECURITY-FAIL2BAN-CADDY-V1 : access-log lisible par fail2ban sur l'hôte
      - ./scripts/social/out:/srv/social:ro # SOCIAL-AUTOPOST-API-A1 : images « ciel du jour » servies en public via /social/*
    networks:
      - astro-net
    depends_on:
      - web
      - api
      - umami # UMAMI-ANALYTICS-V1 : upstream de /analytics/*
    dns:
      - 1.1.1.1
      - 8.8.8.8
x-archive-infra-v2-applied: true
x-patch-menage-v1-applied: true

