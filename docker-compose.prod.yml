networks:
  astro-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  swisseph_data:
    external: true
    name: astro-platform_swisseph_data
  caddy_data:
  caddy_config:

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: astro_platform
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [astro-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.19-community
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks: [astro-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    networks: [astro-net]

  api:
    # PULL-FROM-GHCR-V1 : image pre-built par CI à chaque merge sur
    # main (cf. .github/workflows/ci.yml job "docker"). Sur le VPS,
    # `docker compose pull api && docker compose up -d api` télécharge
    # cette image (~30 sec) au lieu de rebuild localement (~30 min).
    # Le bloc `build:` reste comme fallback : `up --build` rebuild
    # localement en cas d'urgence (GHCR down, etc.).
    image: ghcr.io/azdrian3/llmastro/api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    restart: always
    env_file: .env.local
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://astro:${POSTGRES_PASSWORD}@postgres:5432/astro_platform
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_MODEL: ${XAI_MODEL:-grok-4-1-fast-non-reasoning}
      ASTRO_ENGINE: ${ASTRO_ENGINE:-swisseph}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    networks: [astro-net]
    volumes:
      - swisseph_data:/usr/local/share/swisseph

    expose:
      - '4000'
  web:
    # PULL-FROM-GHCR-V1 (cf. note sur le service api).
    image: ghcr.io/azdrian3/llmastro/web:latest
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://llmastro.com/api
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://llmastro.com/api
      INTERNAL_API_URL: http://api:4000  # CIEL-PUBLIC-V1-PAGES — used by SSR
    depends_on:
      - api
    networks: [astro-net]
    expose:
      - '3000'
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - astro-net
    depends_on:
      - web
      - api
    dns:
      - 1.1.1.1
      - 8.8.8.8
x-archive-infra-v2-applied: true
x-patch-menage-v1-applied: true

# PATCH-COMPOSE-SECRETS-V1 applied

# PATCH-COMPOSE-SECRETS-V2 applied

# ARCHIVE-EPHEMERIDES-SWISSEPH-V1 applied

# CONFIG-HYGIENE-V1 applied
